version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/pgtui
    binary: pgtui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - repository:
      owner: pgplex
      name: homebrew-pgtui
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/pgplex/pgtui"
    description: "A simple terminal UI for PostgreSQL"
    license: "MIT"
    test: |
      system "#{bin}/pgtui", "--version"
    install: |
      bin.install "pgtui"
